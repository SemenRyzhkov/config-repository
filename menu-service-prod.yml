spring:
  datasource:
    # Используем переменные окружения для указания логинов, паролей и урлов
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
  jpa:
    show_sql: false # Выключаем показ sql запросов
    properties:
      hibernate:
        format_sql: false
        show_sql: false

